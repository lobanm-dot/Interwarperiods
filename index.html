    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-2px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes flashOverlay {
            0% { opacity: 1; background-color: white; }
            100% { opacity: 0; background-color: transparent; }
        }
        .animate-flash-overlay {
            animation: flashOverlay 0.8s ease-out forwards;
        }
        @keyframes inputError {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-input-error {
            animation: inputError 0.2s ease-in-out 2;
        }
        @keyframes stir {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }
        .animate-stir {
            animation: stir 0.5s ease-in-out infinite;
        }
    </style>
</head>

        function App() {
          const [gameState, setGameState] = useState('start'); 
          const [currentEventIndex, setCurrentEventIndex] = useState(0);
          const [scores, setScores] = useState(INITIAL_SCORES);
          const [hasAnsweredCurrent, setHasAnsweredCurrent] = useState(false);
          const [currentFeedback, setCurrentFeedback] = useState("");
          const [isMatch, setIsMatch] = useState(false);
          const [canProceed, setCanProceed] = useState(false);

          const [currentChallenge, setCurrentChallenge] = useState(null);
          const [challengeInput, setChallengeInput] = useState("");
          const [challengeError, setChallengeError] = useState(false);
          const [flashEffect, setFlashEffect] = useState(false);

          // Draft Mini-Game State
          const [playerDraftNumber, setPlayerDraftNumber] = useState(null);
          const [draftNumbersDrawn, setDraftNumbersDrawn] = useState([]);
          const [isDrawing, setIsDrawing] = useState(false);
          const [draftResult, setDraftResult] = useState(null);

          // Lend-Lease Mini-Game State
          const [llGuessSpent, setLlGuessSpent] = useState(10);
          const [llGuessDistribution, setLlGuessDistribution] = useState({ britain: 33, ussr: 33, others: 34 });
          const [llGuessUnemployment, setLlGuessUnemployment] = useState(15);
          const [showLlResults, setShowLlResults] = useState(false);

          const event = EVENTS[currentEventIndex];

          useEffect(() => {
            if (gameState === 'game') {
                const currentEvt = EVENTS[currentEventIndex];
                if (currentEvt.vocabChallenge && !currentEvt.vocabChallenge.triggerAfterAnswer) {
                    setCurrentChallenge(currentEvt.vocabChallenge);
                    setChallengeInput("");
                    setChallengeError(false);
                    if (currentEvt.vocabChallenge.isShocking) {
                        setFlashEffect(true);
                        setTimeout(() => setFlashEffect(false), 800);
                    }
                }
            }
          }, [currentEventIndex, gameState]);

          const proceedToNext = () => {
            if (currentEventIndex < EVENTS.length - 1) {
              setCurrentEventIndex(prev => prev + 1);
              setHasAnsweredCurrent(false);
              setCurrentFeedback("");
              setIsMatch(false);
            } else {
              setGameState('results');
            }
          };

          const checkChallenge = (selectedValue = null) => {
              const valueToCheck = typeof selectedValue === 'string' ? selectedValue : challengeInput;
              if (valueToCheck.toLowerCase().trim() === currentChallenge.answer.toLowerCase()) {
                  const isExitChallenge = currentChallenge.triggerAfterAnswer;
                  setCurrentChallenge(null);
                  if (isExitChallenge) {
                      proceedToNext();
                  }
              } else {
                  setChallengeError(true);
              }
          };

          const clamp = (val) => Math.min(Math.max(val, 0), 100);

          const handleStart = () => setGameState('intro');
          const handleBeginGame = () => setGameState('game');

          const handleOptionSelect = (option) => {
            if (hasAnsweredCurrent) return;

            setScores(prev => ({
              ...prev,
              isolationism: clamp(prev.isolationism + option.isolationShift),
              tension: clamp(prev.tension + option.tensionShift),
              matches: option.isHistorical ? prev.matches + 1 : prev.matches
            }));

            setIsMatch(option.isHistorical);
            setCurrentFeedback(option.feedback);
            setHasAnsweredCurrent(true);
            setCanProceed(false);

            setTimeout(() => {
              setCanProceed(true);
            }, 3000);
          };

          const handleNextEvent = () => {
            const currentEvt = EVENTS[currentEventIndex];
            
            // Check if we need to launch the Draft Mini-Game
            if (currentEvt.hasMiniGame && isMatch) {
                setGameState('draft-lottery');
                setPlayerDraftNumber(Math.floor(Math.random() * 900) + 1);
                setDraftNumbersDrawn([]);
                setDraftResult(null);
                return;
            }

            // Check if we need to launch the Lend-Lease Mini-Game
            if (currentEvt.hasLendLeaseMiniGame && isMatch) {
                setGameState('lend-lease-stats');
                setShowLlResults(false);
                return;
            }

            if (currentEvt.vocabChallenge && currentEvt.vocabChallenge.triggerAfterAnswer) {
                setCurrentChallenge(currentEvt.vocabChallenge);
                setChallengeInput("");
                setChallengeError(false);
                if (currentEvt.vocabChallenge.isShocking) {
                    setFlashEffect(true);
                    setTimeout(() => setFlashEffect(false), 800);
                }
                return;
            }
            proceedToNext();
          };

          const startDraftDrawing = () => {
            setIsDrawing(true);
            let count = 0;
            const maxDraws = 8;
            const interval = setInterval(() => {
                const randomNum = Math.floor(Math.random() * 900) + 1;
                setDraftNumbersDrawn(prev => [randomNum, ...prev].slice(0, 5));
                count++;
                
                if (count >= maxDraws) {
                    clearInterval(interval);
                    setIsDrawing(false);
                    const isDrafted = Math.random() < 0.4;
                    if (isDrafted) {
                        setDraftNumbersDrawn(prev => [playerDraftNumber, ...prev]);
                        setDraftResult('drafted');
                    } else {

                    }

          const getPhaseColor = (phaseText) => {
            if (phaseText.includes("Phase 1")) return "text-blue-700 bg-blue-100 border-blue-300";
            if (phaseText.includes("Phase 2")) return "text-amber-700 bg-amber-100 border-amber-300";

                  <i className="fas fa-file-alt mr-3 text-blue-700"></i> Executive Briefing: 1919
                </h2>

                  </div>
                  <div className="flex items-center bg-slate-700 px-3 py-1 rounded border border-slate-600">
                    <i className={`fas fa-exclamation-triangle mr-2 ${scores.tension > 70 ? 'text-red-500 animate-bounce' : 'text-yellow-400'}`}></i>
                    <span className="font-bold">World Tension: {scores.tension}%</span>
                  </div>

                                    </div>

          const LendLeaseMiniGame = () => {
            const historical = { spent: 50.1, distribution: { britain: 63, ussr: 22, others: 15 }, unemployment: 1.2 };
            
            const isSpentWin = Math.abs(llGuessSpent - historical.spent) <= 5;
            const isUnemploymentWin = Math.abs(llGuessUnemployment - historical.unemployment) <= 2;
            const isDistributionWin = 
                Math.abs(llGuessDistribution.britain - historical.distribution.britain) <= 5 &&
                Math.abs(llGuessDistribution.ussr - historical.distribution.ussr) <= 5;

            const handleDistChange = (key, val) => {
                const newVal = parseInt(val);
                const otherKeys = Object.keys(llGuessDistribution).filter(k => k !== key);
                const remaining = 100 - newVal;
                // Simple proportional redistribution for the other two
                const currentOthersSum = llGuessDistribution[otherKeys[0]] + llGuessDistribution[otherKeys[1]];
                setLlGuessDistribution({
                    ...llGuessDistribution,
                    [key]: newVal,
                    [otherKeys[0]]: Math.round((llGuessDistribution[otherKeys[0]] / currentOthersSum) * remaining),
                    [otherKeys[1]]: 100 - newVal - Math.round((llGuessDistribution[otherKeys[0]] / currentOthersSum) * remaining)
                });
            };

            return (
                <div className="min-h-screen bg-slate-900 p-6 flex items-center justify-center overflow-auto">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full p-8 border-t-8 border-green-600">
                        <h2 className="text-4xl font-black text-slate-800 mb-2 text-center uppercase tracking-tighter italic">Arsenal of Democracy Challenge</h2>
                        <p className="text-center text-slate-500 font-bold mb-8">Can you guess the impact of the Lend-Lease program over the course of the war?</p>

                        {!showLlResults ? (
                            <div className="space-y-10 animate-fade-in-up">

                                    <div className="flex items-center gap-6">
                                        <input type="range" min="1" max="100" value={llGuessSpent} onChange={(e) => setLlGuessSpent(e.target.value)} className="flex-1 accent-green-600" />
                                        <span className="text-3xl font-black text-green-700 w-32 text-right">${llGuessSpent}B</span>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-2 italic">*Guess within $5 Billion to win this part.</p>
                                </div>

                                {/* Q2: Distribution */}
                                <div className="bg-slate-50 p-6 rounded-xl border-2 border-slate-200">
                                    <h3 className="text-xl font-black mb-4 flex items-center"><i className="fas fa-chart-pie text-blue-600 mr-2"></i> 2. How was the aid distributed?</h3>
                                    <div className="space-y-6">
                                        <div className="flex items-center gap-4">
                                            <span className="w-24 font-bold text-slate-600">Britain:</span>
                                            <input type="range" min="0" max="100" value={llGuessDistribution.britain} onChange={(e) => handleDistChange('britain', e.target.value)} className="flex-1 accent-blue-600" />
                                            <span className="w-12 font-black">{llGuessDistribution.britain}%</span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="w-24 font-bold text-slate-600">USSR:</span>
                                            <input type="range" min="0" max="100" value={llGuessDistribution.ussr} onChange={(e) => handleDistChange('ussr', e.target.value)} className="flex-1 accent-red-600" />
                                            <span className="w-12 font-black">{llGuessDistribution.ussr}%</span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="w-24 font-bold text-slate-600">Others:</span>
                                            <div className="flex-1 h-2 bg-slate-200 rounded-full relative overflow-hidden">
                                                <div className="h-full bg-slate-400" style={{width: `${llGuessDistribution.others}%`}}></div>
                                            </div>
                                            <span className="w-12 font-black">{llGuessDistribution.others}%</span>
                                        </div>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-4 italic">*Guess within 5% of historical splits to win.</p>
                                </div>

                                {/* Q3: Unemployment */}
                                <div className="bg-slate-50 p-6 rounded-xl border-2 border-slate-200">
                                    <h3 className="text-xl font-black mb-4 flex items-center"><i className="fas fa-user-gear text-amber-600 mr-2"></i> 3. What happened to U.S. Unemployment by 1944?</h3>
                                    <div className="flex items-center gap-6">
                                        <input type="range" min="0" max="25" step="0.5" value={llGuessUnemployment} onChange={(e) => setLlGuessUnemployment(e.target.value)} className="flex-1 accent-amber-600" />

                  <div className={`text-white p-4 flex justify-between items-center ${event.isInvasion ? 'bg-red-800' : 'bg-slate-700'}`}>
                    <h2 className="text-2xl font-black">{event.isInvasion && <i className="fas fa-crosshairs text-red-400 mr-3 animate-pulse"></i>}{event.title}</h2>
                    <span className={`px-3 py-1 rounded font-mono font-bold border ${event.isInvasion ? 'bg-red-950 border-red-700 text-red-300' : 'bg-slate-800 border-slate-600 text-yellow-400'}`}>{event.date}</span>
                  </div>
                  <div className="p-6 md:p-8">
                    {(event.mapUrl || event.dictatorUrl || event.map2Url) && (
                      <div className={`mb-6 flex flex-col ${(event.mapUrl && event.dictatorUrl) || event.map2Url ? 'md:flex-row gap-4' : 'justify-center'}`}>
                        {event.mapUrl && <div className="flex-1 rounded-lg overflow-hidden border-2 border-slate-200 shadow-sm bg-slate-50 flex justify-center"><img src={event.mapUrl} alt={`Visual for ${event.title}`} className="w-full h-auto max-h-72 object-cover md:object-contain" /></div>}
                        {event.map2Url && <div className="flex-1 rounded-lg overflow-hidden border-2 border-slate-200 shadow-sm bg-slate-50 flex justify-center"><img src={event.map2Url} alt={`Secondary Visual for ${event.title}`} className="w-full h-auto max-h-72 object-cover md:object-contain" /></div>}
                        {event.dictatorUrl && <div className="flex-1 rounded-lg overflow-hidden border-2 border-slate-200 shadow-sm bg-slate-50 flex justify-center"><img src={event.dictatorUrl} alt={`Key Figure for ${event.title}`} className="w-full h-auto max-h-72 object-cover md:object-contain" /></div>}
                      </div>
                    )}
                    {event.audioUrl && (
                      <div className="mb-6 bg-slate-100 p-4 rounded-lg border-2 border-slate-300 flex items-center shadow-sm">
                        <i className="fas fa-volume-up text-3xl text-slate-600 mr-4 animate-pulse"></i>
                        <div className="flex-1">
                            <p className="text-sm font-bold text-slate-500 uppercase tracking-wide mb-2">Historical Audio Broadcast</p>
                            <audio controls className="w-full h-10 outline-none rounded">
                                <source src={event.audioUrl} type="audio/wav" /><source src={event.audioUrl.replace('.wav', '.mp3')} type="audio/mpeg" />
                                Your browser does not support the audio element.
                            </audio>
                        </div>
                      </div>
                    )}
                    {event.youtubeId && (
                      <div className="mb-6 bg-slate-100 p-4 rounded-lg border-2 border-slate-300 shadow-sm">
                        <p className="text-sm font-bold text-slate-500 uppercase tracking-wide mb-2"><i className="fab fa-youtube text-red-600 mr-2"></i> Historical Footage</p>
                        <div className="rounded overflow-hidden bg-black border-2 border-slate-800 relative w-full pt-[56.25%] shadow-inner">
                            <iframe className="absolute top-0 left-0 w-full h-full" src={`https://www.youtube.com/embed/${event.youtubeId}?rel=0`} title="YouTube video player" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                        </div>
                      </div>
                    )}
                    <p className="text-xl text-slate-700 leading-relaxed mb-8 border-l-4 border-slate-300 pl-4">{event.description}</p>
                    {!hasAnsweredCurrent ? (
                      <div className="space-y-4">
                        <h3 className="text-md font-bold text-slate-500 uppercase tracking-wide mb-2">As a U.S. Leader, what do you choose?</h3>
                        {event.options.map((opt, i) => (
                          <button key={i} onClick={() => handleOptionSelect(opt)} className="w-full text-left p-4 rounded-lg border-2 border-slate-200 hover:border-blue-500 hover:bg-blue-50 transition shadow-sm font-medium text-lg text-slate-800">{opt.text}</button>
                        ))}
                      </div>
                    ) : (
                      <div className="animate-fade-in-up space-y-6">
                        <div className={`p-4 rounded-lg border-2 flex items-center shadow-sm ${isMatch ? 'bg-green-100 border-green-500 text-green-900' : 'bg-red-50 border-red-400 text-red-900'}`}>
                          <i className={`fas ${isMatch ? 'fa-check-circle text-green-600' : 'fa-times-circle text-red-500'} text-2xl mr-3`}></i>
                          <div><h4 className="font-black text-lg">{isMatch ? "Historical Match!" : "Not Quite History..."}</h4><p className="text-md opacity-90">{currentFeedback}</p></div>
                        </div>
                        <div className="bg-yellow-100 p-6 rounded-xl border-4 border-yellow-400 shadow-lg relative overflow-hidden">
                          <div className="absolute top-0 right-0 bg-yellow-400 text-yellow-900 px-3 py-1 font-black text-sm rounded-bl-lg">{event.spectrumTag}</div>
                          <h4 className="font-black text-yellow-900 mb-3 flex items-center text-2xl uppercase tracking-wide border-b-2 border-yellow-300 pb-2"><i className="fas fa-pen-nib text-yellow-700 animate-pulse mr-3"></i> Stop & Write</h4>
                          <p className="font-bold text-slate-700 mb-2">Grab your paper worksheet and record this historical reality for {event.date}:</p>
                          <div className="bg-white p-4 rounded border border-yellow-300 text-xl font-serif text-slate-800 leading-relaxed shadow-inner">{event.historicalReality}</div>
                        </div>
                        {event.stopAndThink && (
                          <div className="bg-purple-100 p-6 rounded-xl border-4 border-purple-400 shadow-lg relative overflow-hidden mt-6 animate-fade-in-up">
                            <h4 className="font-black text-purple-900 mb-3 flex items-center text-2xl uppercase tracking-wide border-b-2 border-purple-300 pb-2"><i className="fas fa-brain text-purple-700 animate-pulse mr-3"></i> Stop & Think</h4>
                            <p className="text-xl font-medium text-slate-800 leading-relaxed">{event.stopAndThink}</p>
                          </div>
                        )}
                        <div className="text-right pt-4">
                          <button onClick={handleNextEvent} disabled={!canProceed} className={`font-bold py-4 px-8 rounded-lg text-xl shadow-md transition ${canProceed ? 'bg-blue-600 hover:bg-blue-700 text-white cursor-pointer transform hover:scale-105' : 'bg-slate-300 text-slate-500 cursor-not-allowed opacity-70'}`}>
                            {canProceed ? (event.hasMiniGame && isMatch ? "Proceed to the Draft Lottery" : event.hasLendLeaseMiniGame && isMatch ? "Analyze the Economic Impact" : "I have written this down. Next Event") : "Please read and write... (Wait 3s)"} <i className={`fas fa-chevron-right ml-1 ${!canProceed && 'hidden'}`}></i>
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </main>
            </div>
          );

          const ResultsScreen = () => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 py-12">
              <div className="max-w-3xl w-full bg-white rounded-xl shadow-2xl overflow-hidden border-4 border-slate-800">
                <div className="bg-slate-800 text-white p-10 text-center">
                  <i className="fas fa-flag text-yellow-400 text-5xl mb-4"></i>
                  <h1 className="text-5xl font-black mb-2 uppercase tracking-widest">End of the Line</h1>
                  <p className="text-2xl text-slate-300 font-serif italic">December 1941: The United States is at War.</p>
                </div>
                <div className="p-10 space-y-8">
                  <div className="text-center">
                    <h2 className="text-3xl font-black text-slate-800 mb-2 flex justify-center items-center"><i className="fas fa-award text-blue-600 mr-3"></i> Historian Score: {scores.matches} / {EVENTS.length}</h2>
                    <p className="text-lg text-slate-600">You accurately guessed the historical decisions {scores.matches} times.</p>
                  </div>
                  <div className="bg-amber-50 border-l-8 border-amber-500 p-6 rounded-r-lg shadow-md">
                    <h3 className="text-2xl font-bold text-amber-900 mb-3">Final Assignment:</h3>
                    <p className="text-lg text-slate-800 leading-relaxed mb-4">Now that you have seen the U.S. move from the idealistic 1920s, through the strict isolationism of the 1930s, and finally into the gradual intervention of 1941, it is time to answer the big question.</p>
                    <div className="bg-white p-4 rounded border-2 border-dashed border-amber-300 text-center">
                      <p className="font-black text-xl text-slate-800 uppercase text-red-600">Flip your paper worksheet over.</p>
                      <p className="text-lg font-bold mt-2">Complete the final reflection questions using the notes you just took.</p>
                    </div>
                  </div>
                  <div className="text-center pt-6 border-t-2 border-slate-100"><p className="text-slate-500 font-medium">You may close this device when you are finished writing.</p></div>
                </div>
              </div>
            </div>
          );

          return (
            <div className="font-sans antialiased text-slate-900">
              {gameState === 'start' && StartScreen()}
              {gameState === 'intro' && IntroScreen()}
              {gameState === 'game' && GameScreen()}
              {gameState === 'draft-lottery' && DraftMiniGame()}
              {gameState === 'lend-lease-stats' && LendLeaseMiniGame()}
              {gameState === 'results' && ResultsScreen()}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
